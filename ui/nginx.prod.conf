server {
    listen 80;
    server_name _;
    client_max_body_size 100m;

    # Health for compose / deploy script
    location = /health {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Never serve the SPA at domain root — always under /docs-pipeline/*
    location = / {
        return 302 /docs-pipeline/;
    }

    location /docs-pipeline/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /docs-pipeline/index.html;
    }

    # Anything else → app base
    location / {
        return 302 /docs-pipeline/;
    }
}
