server {
    listen 80;
    server_name _;
    client_max_body_size 100m;

    # Health for compose
    location = /health {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # App is served under /docs-pipeline/ when reverse-proxied with path strip
    # Container also serves at / so local `docker compose` port maps work.
    location /docs-pipeline/ {
        alias /usr/share/nginx/html/docs-pipeline/;
        try_files $uri $uri/ /docs-pipeline/index.html;
    }

    location / {
        root /usr/share/nginx/html/docs-pipeline;
        try_files $uri $uri/ /index.html;
    }
}
