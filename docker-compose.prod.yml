# Production / registry deploy — no Marqo GPU, no in-compose Keycloak.
# All app secrets & config come from .env (see .env.example).
#
# Usage:
#   cp .env.example .env   # fill secrets
#   ./scripts/deploy-compose.sh
#   # or:
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#
# Host ports (bind localhost for nginx reverse-proxy; override via .env):
#   API  127.0.0.1:${API_HOST_PORT:-8011}   (8001 often taken by redis on shared hosts)
#   UI   127.0.0.1:${UI_HOST_PORT:-3011}
#   Temporal 7233, MinIO 9000/9001, Temporal UI ${TEMPORAL_UI_PORT:-8090}

services:
  temporal-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:latest
    depends_on:
      temporal-db:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
    ports:
      - "127.0.0.1:7233:7233"
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:latest
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    # Optional ops UI; skip if port busy: --scale temporal-ui=0
    ports:
      - "127.0.0.1:${TEMPORAL_UI_PORT:-8090}:8080"
    restart: unless-stopped
    profiles:
      - ops

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb -p local/$${MINIO_BUCKET:-documents} || true;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-documents}
    restart: "no"

  lang-detect:
    image: docs-pipeline-lang-detect
    build:
      context: ./lang-detect
      dockerfile: Dockerfile
    environment:
      - PORT=3000
    healthcheck:
      # Node fetch — avoids apk/curl on alpine (slow or blocked on some hosts)
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # All pipeline config/secrets: env_file=.env
  # environment: only Docker-network / container-path overrides (must win over localhost values in .env)
  api:
    image: docs-pipeline-api
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - TEMPORAL_HOST=temporal:7233
      - MINIO_ENDPOINT=minio:9000
      - DOCUMENT_DB_PATH=/data/documents.db
      - LANG_DETECT_URL=http://lang-detect:3000
      - ALLOWED_FILE_PATHS=/app/books,/data/documents
      # Hugging Face (embeddings model download / cache)
      - HF_HOME=${HF_HOME:-/opt/hf-cache}
      - HF_HUB_CACHE=${HF_HOME:-/opt/hf-cache}/hub
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    ports:
      # Host 8001 is taken by oan-redis on this registry host — default 8011
      - "127.0.0.1:${API_HOST_PORT:-8011}:8001"
    depends_on:
      temporal:
        condition: service_healthy
      minio:
        condition: service_healthy
      lang-detect:
        condition: service_healthy
    volumes:
      - ./books:/app/books:ro
      - sqlite-data:/data
      - documents-data:/data/documents
      - ${HF_HOME:-/opt/hf-cache}:${HF_HOME:-/opt/hf-cache}
    command: uvicorn pipeline.api:app --host 0.0.0.0 --port 8001
    restart: unless-stopped

  worker:
    image: docs-pipeline-worker
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - TEMPORAL_HOST=temporal:7233
      - MINIO_ENDPOINT=minio:9000
      - DOCUMENT_DB_PATH=/data/documents.db
      - LANG_DETECT_URL=http://lang-detect:3000
      - ALLOWED_FILE_PATHS=/app/books,/data/documents
      - HF_HOME=${HF_HOME:-/opt/hf-cache}
      - HF_HUB_CACHE=${HF_HOME:-/opt/hf-cache}/hub
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    depends_on:
      temporal:
        condition: service_healthy
      minio:
        condition: service_healthy
      api:
        condition: service_started
      lang-detect:
        condition: service_healthy
    volumes:
      - ./books:/app/books:ro
      - sqlite-data:/data
      - documents-data:/data/documents
      - ${HF_HOME:-/opt/hf-cache}:${HF_HOME:-/opt/hf-cache}
    command: python -m pipeline.worker
    restart: unless-stopped

  ui:
    image: docs-pipeline-ui
    build:
      context: ./ui
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/docs-pipeline-api}
        VITE_BASE: ${VITE_BASE:-/docs-pipeline/}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-https://auth-vistaar.da.gov.in/auth}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-bharat-vistaar}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-bharat-vistaar}
        VITE_AUTH_ENABLED: ${VITE_AUTH_ENABLED:-true}
    ports:
      - "127.0.0.1:${UI_HOST_PORT:-3011}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  temporal-db-data:
  minio-data:
  sqlite-data:
  documents-data:
