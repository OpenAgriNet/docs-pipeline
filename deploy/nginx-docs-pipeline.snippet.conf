# Paste into registry-sandbox-vistaar.da.gov.in.conf
# BEFORE the catch-all `location / { ... }`
#
# Host port map (see API_HOST_PORT / UI_HOST_PORT in .env):
#   UI  → 127.0.0.1:3011
#   API → 127.0.0.1:8011  (do NOT use 8001 — taken by oan-redis)

# docs-pipeline FastAPI
location ^~ /docs-pipeline-api/ {
    proxy_pass http://127.0.0.1:8011/;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    client_max_body_size 100m;
}

# docs-pipeline UI (nginx in ui container)
location ^~ /docs-pipeline/ {
    proxy_pass http://127.0.0.1:3011/docs-pipeline/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
