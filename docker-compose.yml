version: '3.8'

services:
  # Temporal Server
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
    depends_on:
      temporal-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  temporal-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # Marqo Vector Search (H100 CUDA 12.1 image built from source)
  marqo:
    image: marqo:2.24.5-h100-cu121
    ports:
      - "8882:8882"
    volumes:
      - marqo-vespa-var:/opt/vespa/var
      - marqo-data:/data
    environment:
      - NVIDIA_VISIBLE_DEVICES=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8882/"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # Language Detection Service (stateless, can scale with --scale flag)
  lang-detect:
    build:
      context: ./lang-detect
      dockerfile: Dockerfile
    # No host port - accessed internally via Docker network. Scale with: docker compose up -d --scale lang-detect=3
    environment:
      - PORT=3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Pipeline API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - TEMPORAL_HOST=temporal:7233
      - MARQO_URL=http://marqo:8882
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=documents
      - DOCUMENT_DB_PATH=/data/documents.db
      - LANG_DETECT_URL=http://lang-detect:3000
      - TRANSLATION_PROVIDER=${TRANSLATION_PROVIDER:-mistral}
      - TRANSLATION_MODEL=${TRANSLATION_MODEL:-mistral-large-latest}
      - DOCUMENT_METADATA_CSV_PATH=/app/workspace/document_manifest.csv
      - DOCUMENT_DESCRIPTIONS_JSONL_PATH=/app/workspace/document_descriptions.jsonl
    depends_on:
      temporal:
        condition: service_healthy
      marqo:
        condition: service_healthy
      minio:
        condition: service_healthy
      lang-detect:
        condition: service_healthy
    command: uvicorn pipeline.api:app --host 0.0.0.0 --port 8001
    volumes:
      - .:/app/workspace:ro
      - ./books:/app/books:ro
      - sqlite-data:/data
    restart: unless-stopped

  # Pipeline Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
      - TEMPORAL_HOST=temporal:7233
      - MARQO_URL=http://marqo:8882
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=documents
      - DOCUMENT_DB_PATH=/data/documents.db
      - LANG_DETECT_URL=http://lang-detect:3000
      - TRANSLATION_PROVIDER=${TRANSLATION_PROVIDER:-mistral}
      - TRANSLATION_MODEL=${TRANSLATION_MODEL:-mistral-large-latest}
      - DOCUMENT_METADATA_CSV_PATH=/app/workspace/document_manifest.csv
      - DOCUMENT_DESCRIPTIONS_JSONL_PATH=/app/workspace/document_descriptions.jsonl
    depends_on:
      temporal:
        condition: service_healthy
      marqo:
        condition: service_healthy
      minio:
        condition: service_healthy
      lang-detect:
        condition: service_healthy
    command: python -m pipeline.worker
    volumes:
      - .:/app/workspace:ro
      - ./books:/app/books:ro
      - sqlite-data:/data
    restart: unless-stopped

  # React UI
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
      - marqo
    restart: unless-stopped

volumes:
  temporal-db-data:
  marqo-vespa-var:
  marqo-data:
  minio-data:
  sqlite-data:
