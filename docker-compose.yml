version: '3.8'

services:
  # Temporal Server
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
    depends_on:
      temporal-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  temporal-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - temporal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # Marqo Vector Search (H100 CUDA 12.1 image built from source)
  marqo:
    image: marqo:2.24.5-h100-cu121
    ports:
      - "8882:8882"
    volumes:
      - marqo-vespa-var:/opt/vespa/var
      - marqo-data:/data
    environment:
      - NVIDIA_VISIBLE_DEVICES=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8882/"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # Keycloak (auth) — part of the stack; API stays AUTH_DISABLED=true until UI Bearer wiring.
  # Host port 8082 avoids clash with temporal-ui on 8080. Relative path /auth matches the realm URLs.
  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      # Prefer a large-capacity volume via KEYCLOAK_DB_DATA_PATH=/mnt/data/docs-pipeline/keycloak/postgres
      - ${KEYCLOAK_DB_DATA_PATH:-./data/keycloak-db}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:22.0.5
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "${KEYCLOAK_PORT:-8082}:8080"
    volumes:
      # Place docs-pipeline-realm.json here (users-skipped realm export with docs-pipeline clients).
      - ./keycloak/import:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    restart: unless-stopped

  # Language Detection Service (stateless, can scale with --scale flag)
  lang-detect:
    build:
      context: ./lang-detect
      dockerfile: Dockerfile
    # No host port - accessed internally via Docker network. Scale with: docker compose up -d --scale lang-detect=3
    environment:
      - PORT=3000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Pipeline API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - TEMPORAL_HOST=temporal:7233
      - MARQO_URL=http://marqo:8882
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=documents
      - DOCUMENT_DB_PATH=/data/documents.db
      - LANG_DETECT_URL=http://lang-detect:3000
      - TRANSLATION_PROVIDER=${TRANSLATION_PROVIDER:-gemma_vllm}
      - TRANSLATION_MODEL=${TRANSLATION_MODEL:-gemma-4-31b-it}
      - TRANSLATION_VLLM_BASE_URL=${TRANSLATION_VLLM_BASE_URL:-http://localhost:8020/v1}
      - TRANSLATION_API_KEY=${TRANSLATION_API_KEY:-}
      - TRANSLATION_PAGE_CONCURRENCY=${TRANSLATION_PAGE_CONCURRENCY:-1}
      - TRANSLATION_MAX_RETRIES=${TRANSLATION_MAX_RETRIES:-6}
      - TRANSLATION_RETRY_BASE_SECONDS=${TRANSLATION_RETRY_BASE_SECONDS:-2.0}
      - OCR_PROVIDER=${OCR_PROVIDER:-chandra}
      - OCR_MODEL=${OCR_MODEL:-chandra}
      - CHANDRA_VLLM_BASE_URL=${CHANDRA_VLLM_BASE_URL:-http://host.docker.internal:8010/v1}
      - CHANDRA_INFERENCE_MODE=${CHANDRA_INFERENCE_MODE:-hf}
      - CHANDRA_MAX_OUTPUT_TOKENS=${CHANDRA_MAX_OUTPUT_TOKENS:-12288}
      - CHANDRA_OCR_MAX_WORKERS=${CHANDRA_OCR_MAX_WORKERS:-4}
      - OCR_SEGMENT_PAGES=${OCR_SEGMENT_PAGES:-20}
      - DOMAIN_TAGGING_PROVIDER=${DOMAIN_TAGGING_PROVIDER:-gemma_vllm}
      - DOMAIN_TAGGING_MODEL=${DOMAIN_TAGGING_MODEL:-gemma-4-31b-it}
      - DOMAIN_TAGGING_VLLM_BASE_URL=${DOMAIN_TAGGING_VLLM_BASE_URL:-http://localhost:8020/v1}
      - DOMAIN_TAGGING_ENABLED=${DOMAIN_TAGGING_ENABLED:-true}
      - DOMAIN_TAGGING_STRICT_TAXONOMY=${DOMAIN_TAGGING_STRICT_TAXONOMY:-true}
      - DOMAIN_TAXONOMY_PATH=${DOMAIN_TAXONOMY_PATH:-}
      - MARQO_INDEX_NAME=${MARQO_INDEX_NAME:-documents-index}
      - CHUNKING_PROVIDER=${CHUNKING_PROVIDER:-qwen_vllm}
      - CHUNKING_MODEL=${CHUNKING_MODEL:-qwen3.5-27b}
      - CHUNKING_VLLM_BASE_URL=${CHUNKING_VLLM_BASE_URL:-http://host.docker.internal:8005/v1}
      - CHUNKING_API_KEY=${CHUNKING_API_KEY:-}
      - CHUNKING_TARGET_CHUNK_TOKENS=${CHUNKING_TARGET_CHUNK_TOKENS:-450}
      - CHUNKING_MAX_CHUNK_TOKENS=${CHUNKING_MAX_CHUNK_TOKENS:-450}
      - CHUNKING_MIN_CHUNK_TOKENS=${CHUNKING_MIN_CHUNK_TOKENS:-100}
      - CHUNKING_OVERLAP_TOKENS=${CHUNKING_OVERLAP_TOKENS:-128}
      - CHUNKING_MAX_PAGES_PER_CHUNK=${CHUNKING_MAX_PAGES_PER_CHUNK:-8}
      - CHUNKING_PAGE_WINDOW_SIZE=${CHUNKING_PAGE_WINDOW_SIZE:-8}
      - CHUNKING_QWEN_ENABLE_THINKING=${CHUNKING_QWEN_ENABLE_THINKING:-false}
      - TEMPORAL_MAX_CONCURRENT_ACTIVITIES=${TEMPORAL_MAX_CONCURRENT_ACTIVITIES:-4}
      - DOCUMENT_METADATA_CSV_PATH=/app/workspace/document_manifest.csv
      - DOCUMENT_DESCRIPTIONS_JSONL_PATH=/app/workspace/document_descriptions.jsonl
      # Auth: keep disabled until UI sends Bearer tokens. Startup logs a loud warning.
      - AUTH_DISABLED=${AUTH_DISABLED:-true}
      - KEYCLOAK_ISSUER=${KEYCLOAK_ISSUER:-}
      - KEYCLOAK_AUDIENCE=${KEYCLOAK_AUDIENCE:-docs-pipeline-api}
      # Prefer in-compose JWKS when Keycloak is on the same Docker network.
      - KEYCLOAK_JWKS_URL=${KEYCLOAK_JWKS_URL:-http://keycloak:8080/auth/realms/docs-pipeline/protocol/openid-connect/certs}
      - DEFAULT_INSTANCE=${DEFAULT_INSTANCE:-default}
    depends_on:
      temporal:
        condition: service_healthy
      marqo:
        condition: service_healthy
      minio:
        condition: service_healthy
      lang-detect:
        condition: service_healthy
    command: uvicorn pipeline.api:app --host 0.0.0.0 --port 8001
    volumes:
      - .:/app/workspace:ro
      - ./books:/app/books:ro
      - sqlite-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Pipeline Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
      - TEMPORAL_HOST=temporal:7233
      - MARQO_URL=http://marqo:8882
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=documents
      - DOCUMENT_DB_PATH=/data/documents.db
      - LANG_DETECT_URL=http://lang-detect:3000
      - TRANSLATION_PROVIDER=${TRANSLATION_PROVIDER:-gemma_vllm}
      - TRANSLATION_MODEL=${TRANSLATION_MODEL:-gemma-4-31b-it}
      - TRANSLATION_VLLM_BASE_URL=${TRANSLATION_VLLM_BASE_URL:-http://localhost:8020/v1}
      - TRANSLATION_API_KEY=${TRANSLATION_API_KEY:-}
      - TRANSLATION_PAGE_CONCURRENCY=${TRANSLATION_PAGE_CONCURRENCY:-1}
      - TRANSLATION_MAX_RETRIES=${TRANSLATION_MAX_RETRIES:-6}
      - TRANSLATION_RETRY_BASE_SECONDS=${TRANSLATION_RETRY_BASE_SECONDS:-2.0}
      - OCR_PROVIDER=${OCR_PROVIDER:-chandra}
      - OCR_MODEL=${OCR_MODEL:-chandra}
      - CHANDRA_VLLM_BASE_URL=${CHANDRA_VLLM_BASE_URL:-http://host.docker.internal:8010/v1}
      - CHANDRA_INFERENCE_MODE=${CHANDRA_INFERENCE_MODE:-hf}
      - CHANDRA_MAX_OUTPUT_TOKENS=${CHANDRA_MAX_OUTPUT_TOKENS:-12288}
      - CHANDRA_OCR_MAX_WORKERS=${CHANDRA_OCR_MAX_WORKERS:-4}
      - OCR_SEGMENT_PAGES=${OCR_SEGMENT_PAGES:-20}
      - DOMAIN_TAGGING_PROVIDER=${DOMAIN_TAGGING_PROVIDER:-gemma_vllm}
      - DOMAIN_TAGGING_MODEL=${DOMAIN_TAGGING_MODEL:-gemma-4-31b-it}
      - DOMAIN_TAGGING_VLLM_BASE_URL=${DOMAIN_TAGGING_VLLM_BASE_URL:-http://localhost:8020/v1}
      - DOMAIN_TAGGING_ENABLED=${DOMAIN_TAGGING_ENABLED:-true}
      - DOMAIN_TAGGING_STRICT_TAXONOMY=${DOMAIN_TAGGING_STRICT_TAXONOMY:-true}
      - DOMAIN_TAXONOMY_PATH=${DOMAIN_TAXONOMY_PATH:-}
      - MARQO_INDEX_NAME=${MARQO_INDEX_NAME:-documents-index}
      - CHUNKING_PROVIDER=${CHUNKING_PROVIDER:-qwen_vllm}
      - CHUNKING_MODEL=${CHUNKING_MODEL:-qwen3.5-27b}
      - CHUNKING_VLLM_BASE_URL=${CHUNKING_VLLM_BASE_URL:-http://host.docker.internal:8005/v1}
      - CHUNKING_API_KEY=${CHUNKING_API_KEY:-}
      - CHUNKING_TARGET_CHUNK_TOKENS=${CHUNKING_TARGET_CHUNK_TOKENS:-450}
      - CHUNKING_MAX_CHUNK_TOKENS=${CHUNKING_MAX_CHUNK_TOKENS:-450}
      - CHUNKING_MIN_CHUNK_TOKENS=${CHUNKING_MIN_CHUNK_TOKENS:-100}
      - CHUNKING_OVERLAP_TOKENS=${CHUNKING_OVERLAP_TOKENS:-128}
      - CHUNKING_MAX_PAGES_PER_CHUNK=${CHUNKING_MAX_PAGES_PER_CHUNK:-8}
      - CHUNKING_PAGE_WINDOW_SIZE=${CHUNKING_PAGE_WINDOW_SIZE:-8}
      - CHUNKING_QWEN_ENABLE_THINKING=${CHUNKING_QWEN_ENABLE_THINKING:-false}
      - TEMPORAL_MAX_CONCURRENT_ACTIVITIES=${TEMPORAL_MAX_CONCURRENT_ACTIVITIES:-4}
      - DOCUMENT_METADATA_CSV_PATH=/app/workspace/document_manifest.csv
      - DOCUMENT_DESCRIPTIONS_JSONL_PATH=/app/workspace/document_descriptions.jsonl
    depends_on:
      temporal:
        condition: service_healthy
      marqo:
        condition: service_healthy
      minio:
        condition: service_healthy
      lang-detect:
        condition: service_healthy
    command: python -m pipeline.worker
    volumes:
      - .:/app/workspace:ro
      - ./books:/app/books:ro
      - sqlite-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # React UI
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_PROXY_TARGET=http://api:8001
      - VITE_MARQO_PROXY_TARGET=http://marqo:8882
    depends_on:
      - api
      - marqo
    restart: unless-stopped

volumes:
  temporal-db-data:
  marqo-vespa-var:
  marqo-data:
  minio-data:
  sqlite-data:
